<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Calculator</title>

<style>

body{
background:#222;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.calculator{
background:#333;
padding:20px;
border-radius:10px;
width:260px;
color:white;
}

#display{
width:100%;
height:40px;
font-size:22px;
margin-bottom:5px;
text-align:right;
border:none;
border-radius:5px;
padding:5px;
}

#result{
height:25px;
text-align:right;
margin-bottom:10px;
color:#0f0;
}

button{
width:55px;
height:45px;
margin:3px;
font-size:18px;
border:none;
border-radius:5px;
cursor:pointer;
}

.num{background:#dcdde1;}
.op{background:#fbc531;}
.equal{background:#4cd137;}
.clear{background:#e84118;}

</style>
</head>

<body>

<div class="calculator">

<input id="display" readonly>
<div id="result"></div>

<div>
<button class="num" onclick="press('7')">7</button>
<button class="num" onclick="press('8')">8</button>
<button class="num" onclick="press('9')">9</button>
<button class="op" onclick="press('/')">/</button>
</div>

<div>
<button class="num" onclick="press('4')">4</button>
<button class="num" onclick="press('5')">5</button>
<button class="num" onclick="press('6')">6</button>
<button class="op" onclick="press('*')">*</button>
</div>

<div>
<button class="num" onclick="press('1')">1</button>
<button class="num" onclick="press('2')">2</button>
<button class="num" onclick="press('3')">3</button>
<button class="op" onclick="press('-')">-</button>
</div>

<div>
<button class="num" onclick="press('0')">0</button>
<button class="num" onclick="press('.')">.</button>
<button class="op" onclick="press('+')">+</button>
<button class="equal" onclick="finalResult()">=</button>
</div>

<div>
<button class="clear" onclick="clearAll()">C</button>
</div>

</div>

<script>

function press(val){

let display=document.getElementById("display");
display.value+=val;

showResult();

}

function showResult(){

let exp=document.getElementById("display").value;

try{

let res=eval(exp);

document.getElementById("result").innerText="= "+res;

}catch{

document.getElementById("result").innerText="";

}

}

function finalResult(){

let exp=document.getElementById("display").value;

try{

document.getElementById("display").value=eval(exp);
document.getElementById("result").innerText="";

}catch{

document.getElementById("display").value="Error";

}

}

function clearAll(){

document.getElementById("display").value="";
document.getElementById("result").innerText="";

}

</script>

</body>
</html>
